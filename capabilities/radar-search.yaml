naftiko: 1.0.0-alpha2
info:
  label: Radar API — Search
  description: 'Radar API — Search. 5 operations. Lead operation: Validate an address. Self-contained Naftiko capability covering
    one Radar business surface.'
  tags:
  - Radar
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RADAR_API_KEY: RADAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: radar-search
    baseUri: https://api.radar.io/v1
    description: Radar API — Search business capability. Self-contained, no shared references.
    resources:
    - name: addresses-validate
      path: /addresses/validate
      operations:
      - name: get
        method: GET
        description: Validate an address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-autocomplete
      path: /search/autocomplete
      operations:
      - name: get
        method: GET
        description: Address autocomplete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
    - name: search-geofences
      path: /search/geofences
      operations:
      - name: get
        method: GET
        description: Search geofences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-places
      path: /search/places
      operations:
      - name: get
        method: GET
        description: Search places
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-users
      path: /search/users
      operations:
      - name: get
        method: GET
        description: Search users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RADAR_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: radar-search-rest
    port: 8080
    description: REST adapter for Radar API — Search. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/addresses/validate
      name: addresses-validate
      description: REST surface for addresses-validate.
      operations:
      - method: GET
        name: get
        description: Validate an address
        call: radar-search.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/autocomplete
      name: search-autocomplete
      description: REST surface for search-autocomplete.
      operations:
      - method: GET
        name: get
        description: Address autocomplete
        call: radar-search.get
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/geofences
      name: search-geofences
      description: REST surface for search-geofences.
      operations:
      - method: GET
        name: get
        description: Search geofences
        call: radar-search.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/places
      name: search-places
      description: REST surface for search-places.
      operations:
      - method: GET
        name: get
        description: Search places
        call: radar-search.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/users
      name: search-users
      description: REST surface for search-users.
      operations:
      - method: GET
        name: get
        description: Search users
        call: radar-search.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: radar-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Radar API — Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: validate-address
      description: Validate an address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-search.get
      outputParameters:
      - type: object
        mapping: $.
    - name: address-autocomplete
      description: Address autocomplete
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-search.get
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: search-geofences
      description: Search geofences
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-search.get
      outputParameters:
      - type: object
        mapping: $.
    - name: search-places
      description: Search places
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-search.get
      outputParameters:
      - type: object
        mapping: $.
    - name: search-users
      description: Search users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-search.get
      outputParameters:
      - type: object
        mapping: $.
