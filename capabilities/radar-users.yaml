naftiko: 1.0.0-alpha2
info:
  label: Radar API — Users
  description: 'Radar API — Users. 4 operations. Lead operation: List users. Self-contained Naftiko capability covering one
    Radar business surface.'
  tags:
  - Radar
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RADAR_API_KEY: RADAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: radar-users
    baseUri: https://api.radar.io/v1
    description: Radar API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: get
        method: GET
        description: List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: get
        method: GET
        description: Retrieve a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
      - name: put
        method: PUT
        description: Update a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: Delete a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RADAR_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: radar-users-rest
    port: 8080
    description: REST adapter for Radar API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: get
        description: List users
        call: radar-users.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: GET
        name: get
        description: Retrieve a user
        call: radar-users.get
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Update a user
        call: radar-users.put
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete a user
        call: radar-users.delete
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: radar-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Radar API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-users
      description: List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-users.get
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-user
      description: Retrieve a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-users.get
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: Update a user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: radar-users.put
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-user
      description: Delete a user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: radar-users.delete
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
