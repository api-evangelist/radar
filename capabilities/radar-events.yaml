naftiko: 1.0.0-alpha2
info:
  label: Radar API — Events
  description: 'Radar API — Events. 2 operations. Lead operation: List events. Self-contained Naftiko capability covering
    one Radar business surface.'
  tags:
  - Radar
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RADAR_API_KEY: RADAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: radar-events
    baseUri: https://api.radar.io/v1
    description: Radar API — Events business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events
      operations:
      - name: get
        method: GET
        description: List events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: events-eventId
      path: /events/{eventId}
      operations:
      - name: get
        method: GET
        description: Retrieve an event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RADAR_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: radar-events-rest
    port: 8080
    description: REST adapter for Radar API — Events. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: GET
        name: get
        description: List events
        call: radar-events.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/{eventid}
      name: events-eventid
      description: REST surface for events-eventId.
      operations:
      - method: GET
        name: get
        description: Retrieve an event
        call: radar-events.get
        with:
          eventId: rest.eventId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: radar-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Radar API — Events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-events
      description: List events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-events.get
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-event
      description: Retrieve an event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-events.get
      with:
        eventId: tools.eventId
      outputParameters:
      - type: object
        mapping: $.
