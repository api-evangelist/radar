    description: Radar API — Geofences business capability. Self-contained, no shared references.
    resources:
    - name: geofences
      path: /geofences
      operations:
      - name: get
        method: GET
        description: List geofences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create a geofence
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: geofences-geofenceId
      path: /geofences/{geofenceId}
      operations:
      - name: get
        method: GET
        description: Retrieve a geofence
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: geofenceId
          in: path
          type: string
          required: true
      - name: put
        method: PUT
        description: Update a geofence
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: geofenceId
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: Delete a geofence
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: geofenceId
          in: path
          type: string
          required: true
    authentication:
