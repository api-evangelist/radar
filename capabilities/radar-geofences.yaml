      description: List geofences
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-geofences.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-geofence
      description: Create a geofence
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: radar-geofences.post
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-geofence
      description: Retrieve a geofence
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: radar-geofences.get
      with:
        geofenceId: tools.geofenceId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-geofence
      description: Update a geofence
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: radar-geofences.put
      with:
        geofenceId: tools.geofenceId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-geofence
      description: Delete a geofence
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: radar-geofences.delete
      with:
        geofenceId: tools.geofenceId
      outputParameters:
      - type: object
        mapping: $.
